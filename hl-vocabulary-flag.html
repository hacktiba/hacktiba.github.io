function show(){answered=false;chances=3;const r=deck[i];$('word').textContent=r.word;$('chances').textContent=chances;$('progress').textContent=i+1;$('total').textContent=deck.length;$('fill').style.width=((i)/deck.length*100)+'%';$('msg').className='msg';$('msg').textContent='';$('next').hidden=true;document.querySelectorAll('.flag').forEach(b=>b.disabled=false)}
function answer(lang){if(answered)return;const r=deck[i];if(r.languages.includes(lang)){score+=chances*10;$('score').textContent=score;$('msg').className='msg ok';$('msg').innerHTML='✅ Correto!<br>"'+r.word+'" significa "'+r.translation+'".';answered=true;endTurn();}else{chances--;$('chances').textContent=chances;if(chances>0){$('msg').className='msg bad';$('msg').textContent='❌ Tente outra bandeira.'}else{$('msg').className='msg bad';$('msg').innerHTML='❌ Acabaram as chances!<br>Era '+r.languages.map(l=>LANG_NAMES[l]).join(' ou ')+'.<br>"'+r.word+'" significa "'+r.translation+'".';answered=true;endTurn();}}
function endTurn(){document.querySelectorAll('.flag').forEach(b=>b.disabled=true);$('next').hidden=false;$('fill').style.width=((i+1)/deck.length*100)+'%'}
$('buttons').addEventListener('click',e=>{const b=e.target.closest('button[data-lang]');if(b)answer(b.dataset.lang)});
$('next').onclick=()=>{i++; if(i>=deck.length){$('word').textContent='Fim!';$('msg').className='msg ok';$('msg').textContent='Pontuação final: '+score;document.querySelectorAll('.flag').forEach(b=>b.disabled=true);$('next').hidden=true;}else show();};
$('restart').onclick=start;start();
</script></body></html>
