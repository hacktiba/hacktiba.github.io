<script>
(()=>{'use strict';
const $=id=>document.getElementById(id), langs={espanhol:'🇪🇸 Espanhol',ingles:'🇺🇸 Inglês',italiano:'🇮🇹 Italiano',frances:'🇫🇷 Francês',alemao:'🇩🇪 Alemão'};
let bank=[],round=[],i=0,score=0,chances=3,streak=0,hits=0,misses=0,answered=false;
const els={start:$('start'),game:$('game'),end:$('end'),btn:$('startBtn'),status:$('status'),err:$('error'),word:$('word'),score:$('score'),chances:$('chances'),streak:$('streak'),progress:$('progress'),total:$('total'),msg:$('msg'),next:$('next'),final:$('finalScore'),hits:$('hits'),misses:$('misses')};
function safeText(el,t){el.textContent=String(t)}
function msg(t,c){safeText(els.msg,t);els.msg.className='msg '+c}
function buttons(dis){document.querySelectorAll('.flag').forEach(b=>b.disabled=dis)}
function scoreUI(){safeText(els.score,score);safeText(els.streak,streak)}
function sample(arr,n){const a=arr.slice();for(let k=0;k<n;k++){const j=k+Math.floor(Math.random()*(a.length-k));[a[k],a[j]]=[a[j],a[k]]}return a.slice(0,n)}
function valid(list){if(!Array.isArray(list))throw Error('O arquivo palavras.json não é uma lista JSON.');const ok=new Set(Object.keys(langs));const out=[];for(const x of list){if(!x||!ok.has(x.language))continue;const w=String(x.word||'').trim(),p=String(x.portuguese||x.translation||'').trim();if(w&&p)out.push({word:w,language:x.language,portuguese:p})}if(out.length<10)throw Error('Poucas palavras válidas encontradas.');return out}
function load(){try{els.btn.disabled=true;safeText(els.btn,'Carregando...');safeText(els.status,'Preparando banco interno de palavras...');const raw=document.getElementById('wordData').textContent;bank=valid(JSON.parse(raw));safeText(els.status,bank.length.toLocaleString('pt-BR')+' palavras carregadas. Pronto!');safeText(els.btn,'Começar jogo ▶');els.btn.disabled=false}catch(e){safeText(els.status,'Falha ao carregar banco interno.');els.err.classList.remove('hidden');safeText(els.err,'Erro no banco interno de palavras: '+e.message);safeText(els.btn,'Sem banco de palavras');}}
function startGame(){if(!bank.length)return;const v=$('round').value,n=v==='all'?bank.length:Math.min(+v,bank.length);round=sample(bank,n);i=0;score=0;chances=3;streak=0;hits=0;misses=0;answered=false;scoreUI();safeText(els.total,round.length);els.start.classList.add('hidden');els.end.classList.add('hidden');els.game.classList.remove('hidden');show()}
function show(){const c=round[i];safeText(els.word,c.word);chances=3;answered=false;safeText(els.chances,chances);safeText(els.progress,i+1);msg('Escolha uma bandeira.','neutral');els.next.classList.add('hidden');buttons(false)}
function answer(lang){if(answered)return;const c=round[i];if(lang===c.language){const pts=chances*($('mode').value==='hard'?8:10)+streak;score+=pts;streak++;hits++;scoreUI();msg('✅ Correto!\n"'+c.word+'" significa "'+c.portuguese+'" em português.\n+'+pts+' pontos.','correct');answered=true;buttons(true);els.next.classList.remove('hidden')}else{chances--;safeText(els.chances,chances);if(chances>0)msg('❌ Errado! Você ainda tem '+chances+' chance(s).','wrong');else{streak=0;misses++;scoreUI();msg('❌ Acabaram as chances!\nEra '+langs[c.language]+'.\n"'+c.word+'" significa "'+c.portuguese+'".','wrong');answered=true;buttons(true);els.next.classList.remove('hidden')}}}
function endGame(){els.game.classList.add('hidden');els.start.classList.add('hidden');els.end.classList.remove('hidden');safeText(els.final,score);safeText(els.hits,hits);safeText(els.misses,misses)}
function home(){els.end.classList.add('hidden');els.game.classList.add('hidden');els.start.classList.remove('hidden')}
els.btn.onclick=startGame;els.next.onclick=()=>{i++;i>=round.length?endGame():show()};$('quit').onclick=endGame;$('again').onclick=startGame;$('home').onclick=home;document.querySelectorAll('.flag').forEach(b=>b.onclick=()=>answer(b.dataset.lang));load();
})();
</script>
