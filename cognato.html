</head>
<body><main class="app">

</main>

const LANGS={en:{name:'Inglês',flag:'🇺🇸',locale:'en-US'},es:{name:'Espanhol',flag:'🇪🇸',locale:'es-ES'},it:{name:'Italiano',flag:'🇮🇹',locale:'it-IT'},fr:{name:'Francês',flag:'🇫🇷',locale:'fr-FR'},de:{name:'Alemão',flag:'🇩🇪',locale:'de-DE'}};
const IDS=['en','es','it','fr','de']; const $=id=>document.getElementById(id);
let deck=[],index=0,score=0,tries=3,answered=false,correctCount=0,wrongCount=0;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function escapeHtml(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function buildDeck(){const mode=$('mode').value;let q=[];if(mode!=='false') COGNATES.forEach((x,n)=>q.push({type:'family',data:x,target:IDS[n%5]}));if(mode!=='family') FALSE_FRIENDS.forEach(x=>q.push({type:'false',data:x}));shuffle(q);const a=$('amount').value;return a==='all'?q:q.slice(0,Math.min(Number(a),q.length))}
function start(){deck=buildDeck();index=0;score=0;correctCount=0;wrongCount=0;$('start').classList.add('hidden');$('finish').classList.add('hidden');$('game').classList.remove('hidden');show()}
function show(){answered=false;tries=3;$('tries').textContent=tries;$('score').textContent=score;$('prog').textContent=(index+1)+'/'+deck.length;$('bar').style.width=(index/deck.length*100)+'%';$('feedback').className='feedback hidden';$('nextBtn').classList.add('hidden');const q=deck[index];q.type==='family'?renderFamily(q):renderFalse(q)}
function renderFamily(q){const x=q.data,t=q.target,L=LANGS[t];let cards=IDS.map(id=>`<div class="langCard ${id===t?'blank':''}"><div class="langTop">${LANGS[id].flag} ${LANGS[id].name}</div><div class="langWord">${id===t?'?':escapeHtml(x[id])}</div></div>`).join('');let pool=[x[t]];for(const other of shuffle(COGNATES.filter(y=>y.pt!==x.pt).slice())){if(!pool.some(v=>v.toLowerCase()===other[t].toLowerCase()))pool.push(other[t]);if(pool.length===5)break}shuffle(pool);$('stage').innerHTML=`<span class="badge">Família cognata</span><div class="concept">${escapeHtml(x.pt)}</div><div class="question">Complete a palavra em ${L.flag} ${L.name}.</div><div class="family">${cards}</div><div class="options">${pool.map(v=>`<button class="option" data-answer="${escapeHtml(v)}">${escapeHtml(v)}</button>`).join('')}</div>`;document.querySelectorAll('.option').forEach(b=>b.onclick=()=>answerFamily(b,x,t))}
function answerFamily(btn,x,t){if(answered||btn.disabled)return;const ok=btn.dataset.answer===x[t];if(ok){btn.classList.add('correct');score+=tries*10;correctCount++;finishRound(`<b>✅ Correto:</b> ${escapeHtml(x[t])}.<br><b>Padrão:</b> ${escapeHtml(x.pattern)}.<br>${IDS.map(id=>LANGS[id].flag+' '+escapeHtml(x[id])).join(' · ')}`,true)}else{btn.classList.add('wrong');btn.disabled=true;tries--;$('tries').textContent=tries;if(tries===0){wrongCount++;const right=[...document.querySelectorAll('.option')].find(b=>b.dataset.answer===x[t]);if(right)right.classList.add('correct');finishRound(`<b>❌ A resposta era:</b> ${escapeHtml(x[t])}.<br><b>Padrão:</b> ${escapeHtml(x.pattern)}.`,false)}else showTemp('Ainda não. Compare as terminações e tente novamente.')}}
function renderFalse(q){const x=q.data,L=LANGS[x.lang];let pool=[x.meaning,x.trap];for(const other of shuffle(FALSE_FRIENDS.filter(y=>y.word!==x.word).slice())){if(!pool.includes(other.meaning))pool.push(other.meaning);if(pool.length===5)break}shuffle(pool);$('stage').innerHTML=`<span class="badge">Falso cognato</span><div class="falseBox"><div class="langTop">${L.flag} ${L.name}</div><div class="falseWord">${escapeHtml(x.word)}</div><button class="audio" id="speakBtn">🔊 Ouvir</button></div><div class="question">Qual é o significado correto em português?</div><div class="options">${pool.map(v=>`<button class="option" data-answer="${escapeHtml(v)}">${escapeHtml(v)}</button>`).join('')}</div>`;$('speakBtn').onclick=()=>speak(x.word,L.locale);document.querySelectorAll('.option').forEach(b=>b.onclick=()=>answerFalse(b,x))}
function answerFalse(btn,x){if(answered||btn.disabled)return;const ok=btn.dataset.answer===x.meaning;if(ok){btn.classList.add('correct');score+=tries*10;correctCount++;finishRound(`<b>✅ ${escapeHtml(x.word)}</b> significa <b>${escapeHtml(x.meaning)}</b>.<br>Não confunda com ${escapeHtml(x.trap)}. ${escapeHtml(x.compare)}`,true)}else{btn.classList.add('wrong');btn.disabled=true;tries--;$('tries').textContent=tries;if(tries===0){wrongCount++;const right=[...document.querySelectorAll('.option')].find(b=>b.dataset.answer===x.meaning);if(right)right.classList.add('correct');finishRound(`<b>❌ ${escapeHtml(x.word)}</b> significa <b>${escapeHtml(x.meaning)}</b>.<br>Não confunda com ${escapeHtml(x.trap)}. ${escapeHtml(x.compare)}`,false)}else showTemp('Essa é a armadilha. Tente outra opção.')}}
function showTemp(text){$('feedback').innerHTML=escapeHtml(text);$('feedback').className='feedback bad'}
function finishRound(html,ok){answered=true;document.querySelectorAll('.option').forEach(b=>b.disabled=true);$('score').textContent=score;$('bar').style.width=((index+1)/deck.length*100)+'%';$('feedback').innerHTML=html;$('feedback').className='feedback '+(ok?'ok':'bad');$('nextBtn').classList.remove('hidden')}
function next(){index++;if(index>=deck.length)return finishGame();show()}
function finishGame(){$('game').classList.add('hidden');$('finish').classList.remove('hidden');$('finalScore').textContent=score;$('summary').innerHTML=`<b>Acertos:</b> ${correctCount}<br><b>Rodadas sem acerto:</b> ${wrongCount}<br><b>Aproveitamento:</b> ${Math.round(correctCount/deck.length*100)}%`}
function reset(){speechSynthesis.cancel();$('game').classList.add('hidden');$('finish').classList.add('hidden');$('start').classList.remove('hidden')}
function speak(text,locale){if(!('speechSynthesis' in window))return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=locale;u.rate=.82;window.speechSynthesis.speak(u)}
$('baseInfo').textContent=COGNATES.length+' famílias cognatas + '+FALSE_FRIENDS.length+' falsos amigos.';$('startBtn').onclick=start;$('nextBtn').onclick=next;$('quitBtn').onclick=reset;$('againBtn').onclick=reset;
</script></body></html>
