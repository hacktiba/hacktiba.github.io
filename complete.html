<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HL Complete 5 Idiomas</title>
<style>
:root{--primary:#4f46e5;--bg1:#4f46e5;--bg2:#06b6d4;--dark:#17143e;--muted:#6b7280;--soft:#eef2ff;--line:#e5e7eb;--ok:#16a34a;--bad:#dc2626;--card:#fff}
*{box-sizing:border-box}body{margin:0;min-height:100svh;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));display:flex;align-items:center;justify-content:center;padding:10px;color:#111827}.app{width:min(560px,100%);background:var(--card);border-radius:22px;padding:14px;box-shadow:0 18px 40px rgba(0,0,0,.22);text-align:center}.top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:6px}.menuBtn{display:inline-block;text-decoration:none;background:#e5e7eb;color:#111827;border-radius:12px;padding:9px 12px;font-weight:900;font-size:14px}.title{font-size:clamp(24px,6vw,38px);font-weight:1000;color:var(--primary);margin:4px 0;line-height:1.05}.subtitle{font-size:clamp(13px,3.4vw,18px);color:var(--muted);margin:0 0 8px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px}.stat{background:#f3f4f6;border:1px solid var(--line);border-radius:14px;padding:8px 5px;font-size:clamp(15px,4vw,20px);font-weight:900}.progressWrap{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:8px 0 10px}.progressBar{height:100%;width:0;background:var(--primary);transition:.25s}.prompt{background:var(--soft);border:2px solid #c7d2fe;border-radius:18px;padding:12px;margin-bottom:10px}.pt{font-size:clamp(28px,8vw,46px);font-weight:1000;color:var(--dark);line-height:1.05}.hint{font-size:clamp(13px,3.6vw,17px);color:var(--muted);margin-top:5px}.grid{display:grid;grid-template-columns:1fr;gap:7px;margin:8px 0}.row{display:grid;grid-template-columns:82px 1fr;align-items:center;text-align:left;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:8px;font-weight:850;font-size:clamp(15px,3.8vw,18px)}.row .flag{text-align:center;font-size:20px}.missing{background:#fff7ed;border-color:#fdba74;color:#9a3412}.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.opt{border:2px solid var(--line);background:#fff;border-radius:14px;padding:12px 8px;font-size:clamp(16px,4.2vw,21px);font-weight:950;cursor:pointer}.opt:active{transform:scale(.98)}.opt:disabled{opacity:.6}.msg{margin-top:9px;border-radius:14px;padding:10px;font-size:clamp(15px,4vw,20px);font-weight:900}.ok{background:#dcfce7;color:#166534}.bad{background:#fee2e2;color:#991b1b}.actions{display:flex;gap:8px;margin-top:9px}.mainBtn{flex:1;border:0;border-radius:14px;padding:12px;font-size:clamp(15px,4vw,20px);font-weight:950;cursor:pointer;background:var(--primary);color:white}.secondary{background:#e5e7eb;color:#111827}.hidden{display:none!important}.startPanel{display:block}.gamePanel{display:none}.select{width:100%;font-size:18px;font-weight:850;padding:11px;border-radius:14px;border:2px solid var(--line);background:#fff;margin:8px 0 10px}@media(max-height:700px){.title{font-size:24px}.subtitle{display:none}.prompt{padding:9px}.pt{font-size:30px}.row{padding:6px}.opt{padding:9px}.msg{padding:8px}.app{padding:10px;border-radius:18px}}
</style>
</head>
<body>
<main class="app">
<section id="start" class="startPanel">
  <div class="top"><a class="menuBtn" href="flags.html">🏠 Menu</a><span></span></div>
  <h1 class="title">🧩 Complete 5 Idiomas</h1>
  <p class="subtitle">Complete o idioma que falta. Só uma opção está certa.</p>
  <select id="amount" class="select">
    <option value="10">10 palavras</option>
    <option value="20" selected>20 palavras</option>
    <option value="50">50 palavras</option>
    <option value="100">100 palavras</option>
  </select>
  <button id="startBtn" class="mainBtn">Começar ▶</button>
  <div id="status" class="subtitle">Base pronta.</div>
</section>

<section id="game" class="gamePanel">
  <div class="top"><a class="menuBtn" href="flags.html">🏠 Menu</a><span></span></div>
  <h1 class="title">🧩 Complete 5 Idiomas</h1>
  <div class="stats"><div class="stat">⭐ <span id="score">0</span></div><div class="stat">❤️ <span id="chances">3</span></div><div class="stat">📘 <span id="prog">0/0</span></div></div>
  <div class="progressWrap"><div id="bar" class="progressBar"></div></div>
  <div class="prompt"><div id="pt" class="pt">palavra</div><div id="hint" class="hint">Escolha a palavra correta para o idioma que falta.</div></div>
  <div id="table" class="grid"></div>
  <div id="options" class="options"></div>
  <div id="msg" class="msg hidden"></div>
  <div class="actions"><button id="next" class="mainBtn hidden">Próxima ➜</button><button id="restart" class="mainBtn secondary">Reiniciar</button></div>
</section>
</main>
<script>
'use strict';
const LANGS=[['ingles','🇺🇸','Inglês'],['espanhol','🇪🇸','Espanhol'],['italiano','🇮🇹','Italiano'],['frances','🇫🇷','Francês'],['alemao','🇩🇪','Alemão']];
// Palavras diferentes da base do flag.html. Formato: [português, inglês, espanhol, italiano, francês, alemão]
const DATA=[
['abacaxi','pineapple','piña','ananas','ananas','Ananas'],['morango','strawberry','fresa','fragola','fraise','Erdbeere'],['melancia','watermelon','sandía','anguria','pastèque','Wassermelone'],['pêssego','peach','melocotón','pesca','pêche','Pfirsich'],['pera','pear','pera','pera','poire','Birne'],['cereja','cherry','cereza','ciliegia','cerise','Kirsche'],['amendoim','peanut','cacahuete','arachide','cacahuète','Erdnuss'],['mel','honey','miel','miele','miel','Honig'],['iogurte','yogurt','yogur','yogurt','yaourt','Joghurt'],['macarrão','pasta','pasta','pasta','pâtes','Nudeln'],
['garfo','fork','tenedor','forchetta','fourchette','Gabel'],['faca','knife','cuchillo','coltello','couteau','Messer'],['colher','spoon','cuchara','cucchiaio','cuillère','Löffel'],['prato','plate','plato','piatto','assiette','Teller'],['copo','glass','vaso','bicchiere','verre','Glas'],['xícara','cup','taza','tazza','tasse','Tasse'],['garrafa','bottle','botella','bottiglia','bouteille','Flasche'],['cozinha','kitchen','cocina','cucina','cuisine','Küche'],['quarto','bedroom','dormitorio','camera','chambre','Schlafzimmer'],['banheiro','bathroom','baño','bagno','salle de bain','Badezimmer'],
['sofá','sofa','sofá','divano','canapé','Sofa'],['cama','bed','cama','letto','lit','Bett'],['espelho','mirror','espejo','specchio','miroir','Spiegel'],['relógio','clock','reloj','orologio','horloge','Uhr'],['chave','key','llave','chiave','clé','Schlüssel'],['mochila','backpack','mochila','zaino','sac à dos','Rucksack'],['camisa','shirt','camisa','camicia','chemise','Hemd'],['calça','pants','pantalón','pantaloni','pantalon','Hose'],['sapato','shoe','zapato','scarpa','chaussure','Schuh'],['casaco','coat','abrigo','cappotto','manteau','Mantel'],
['chapéu','hat','sombrero','cappello','chapeau','Hut'],['meia','sock','calcetín','calzino','chaussette','Socke'],['anel','ring','anillo','anello','bague','Ring'],['bolsa','bag','bolso','borsa','sac','Tasche'],['carteira','wallet','cartera','portafoglio','portefeuille','Geldbörse'],['dinheiro','money','dinero','denaro','argent','Geld'],['preço','price','precio','prezzo','prix','Preis'],['recibo','receipt','recibo','ricevuta','reçu','Quittung'],['troco','change','cambio','resto','monnaie','Wechselgeld'],['presente','gift','regalo','regalo','cadeau','Geschenk'],
['viagem','trip','viaje','viaggio','voyage','Reise'],['passaporte','passport','pasaporte','passaporto','passeport','Reisepass'],['mala','suitcase','maleta','valigia','valise','Koffer'],['mapa','map','mapa','mappa','carte','Karte'],['bilhete','ticket','billete','biglietto','billet','Ticket'],['estação','station','estación','stazione','gare','Bahnhof'],['aeroporto','airport','aeropuerto','aeroporto','aéroport','Flughafen'],['porto','port','puerto','porto','port','Hafen'],['praia','beach','playa','spiaggia','plage','Strand'],['ilha','island','isla','isola','île','Insel'],
['deserto','desert','desierto','deserto','désert','Wüste'],['vale','valley','valle','valle','vallée','Tal'],['campo','field','campo','campo','champ','Feld'],['jardim','garden','jardín','giardino','jardin','Garten'],['grama','grass','césped','erba','herbe','Gras'],['semente','seed','semilla','seme','graine','Samen'],['raiz','root','raíz','radice','racine','Wurzel'],['galho','branch','rama','ramo','branche','Ast'],['fruta','fruit','fruta','frutto','fruit','Frucht'],['legume','vegetable','verdura','verdura','légume','Gemüse'],
['borboleta','butterfly','mariposa','farfalla','papillon','Schmetterling'],['mosquito','mosquito','mosquito','zanzara','moustique','Mücke'],['aranha','spider','araña','ragno','araignée','Spinne'],['formiga','ant','hormiga','formica','fourmi','Ameise'],['pato','duck','pato','anatra','canard','Ente'],['águia','eagle','águila','aquila','aigle','Adler'],['coruja','owl','búho','gufo','hibou','Eule'],['coelho','rabbit','conejo','coniglio','lapin','Kaninchen'],['raposa','fox','zorro','volpe','renard','Fuchs'],['lobo','wolf','lobo','lupo','loup','Wolf'],
['golfinho','dolphin','delfín','delfino','dauphin','Delfin'],['baleia','whale','ballena','balena','baleine','Wal'],['tubarão','shark','tiburón','squalo','requin','Hai'],['polvo','octopus','pulpo','polpo','poulpe','Krake'],['caranguejo','crab','cangrejo','granchio','crabe','Krabbe'],['tartaruga','turtle','tortuga','tartaruga','tortue','Schildkröte'],['lagarto','lizard','lagarto','lucertola','lézard','Eidechse'],['jacaré','alligator','caimán','alligatore','alligator','Alligator'],['pinguim','penguin','pingüino','pinguino','pingouin','Pinguin'],['camelo','camel','camello','cammello','chameau','Kamel'],
['segunda','Monday','lunes','lunedì','lundi','Montag'],['terça','Tuesday','martes','martedì','mardi','Dienstag'],['quarta','Wednesday','miércoles','mercoledì','mercredi','Mittwoch'],['quinta','Thursday','jueves','giovedì','jeudi','Donnerstag'],['sexta','Friday','viernes','venerdì','vendredi','Freitag'],['sábado','Saturday','sábado','sabato','samedi','Samstag'],['domingo','Sunday','domingo','domenica','dimanche','Sonntag'],['janeiro','January','enero','gennaio','janvier','Januar'],['fevereiro','February','febrero','febbraio','février','Februar'],['março','March','marzo','marzo','mars','März'],
['abril','April','abril','aprile','avril','April'],['maio','May','mayo','maggio','mai','Mai'],['junho','June','junio','giugno','juin','Juni'],['julho','July','julio','luglio','juillet','Juli'],['agosto','August','agosto','agosto','août','August'],['setembro','September','septiembre','settembre','septembre','September'],['outubro','October','octubre','ottobre','octobre','Oktober'],['novembro','November','noviembre','novembre','novembre','November'],['dezembro','December','diciembre','dicembre','décembre','Dezember'],['primavera','spring','primavera','primavera','printemps','Frühling'],
['verão','summer','verano','estate','été','Sommer'],['outono','autumn','otoño','autunno','automne','Herbst'],['inverno','winter','invierno','inverno','hiver','Winter'],['calor','heat','calor','calore','chaleur','Hitze'],['gelo','ice','hielo','ghiaccio','glace','Eis'],['tempestade','storm','tormenta','tempesta','tempête','Sturm'],['trovão','thunder','trueno','tuono','tonnerre','Donner'],['raio','lightning','rayo','fulmine','éclair','Blitz'],['arco-íris','rainbow','arcoíris','arcobaleno','arc-en-ciel','Regenbogen'],['sombra','shadow','sombra','ombra','ombre','Schatten']
];
const $=id=>document.getElementById(id);let deck=[],idx=0,score=0,chances=3,answer=null,locked=false;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
function validate(){const ok=DATA.every(r=>Array.isArray(r)&&r.length===6&&r.every(Boolean));$('status').textContent= ok ? 'Base pronta: '+DATA.length+' palavras.' : 'Erro na base.';$('startBtn').disabled=!ok;}
function start(){const n=Math.min(Number($('amount').value)||20,DATA.length);deck=shuffle(DATA.slice()).slice(0,n);idx=0;score=0;showPanel(true);showRound();}
function showPanel(game){$('start').style.display=game?'none':'block';$('game').style.display=game?'block':'none';}
function showRound(){locked=false;chances=3;const r=deck[idx];const missing=Math.floor(Math.random()*5)+1;answer=r[missing];const optionPool=DATA.map(x=>x[missing]).filter(x=>x!==answer);const opts=shuffle([answer,...shuffle([...new Set(optionPool)]).slice(0,4)]);$('score').textContent=score;$('chances').textContent=chances;$('prog').textContent=(idx+1)+'/'+deck.length;$('bar').style.width=(idx/deck.length*100)+'%';$('pt').textContent=r[0];$('hint').textContent='Complete o idioma que está faltando.';$('msg').className='msg hidden';$('next').classList.add('hidden');const table=$('table');table.innerHTML='';LANGS.forEach((L,i)=>{const row=document.createElement('div');row.className='row'+(i+1===missing?' missing':'');row.innerHTML='<div class="flag">'+L[1]+'</div><div><b>'+L[2]+':</b> '+(i+1===missing?'????':esc(r[i+1]))+'</div>';table.appendChild(row);});const box=$('options');box.innerHTML='';opts.forEach(o=>{const b=document.createElement('button');b.className='opt';b.textContent=o;b.onclick=()=>choose(o);box.appendChild(b);});}
function choose(o){if(locked)return;if(o===answer){locked=true;score+=chances*10;$('score').textContent=score;$('msg').innerHTML='✅ Correto! A resposta é <b>'+esc(answer)+'</b>.';$('msg').className='msg ok';finish();}else{chances--;$('chances').textContent=chances;if(chances>0){$('msg').textContent='❌ Errado. Tente novamente.';$('msg').className='msg bad';}else{locked=true;$('msg').innerHTML='❌ Acabaram as chances. Era <b>'+esc(answer)+'</b>.';$('msg').className='msg bad';finish();}}}
function finish(){document.querySelectorAll('.opt').forEach(b=>b.disabled=true);$('bar').style.width=((idx+1)/deck.length*100)+'%';$('next').classList.remove('hidden');}
function next(){idx++;if(idx>=deck.length){$('pt').textContent='Fim!';$('hint').textContent='Pontuação final: '+score;$('table').innerHTML='';$('options').innerHTML='';$('msg').textContent='🏆 Você terminou o jogo.';$('msg').className='msg ok';$('next').classList.add('hidden');$('prog').textContent=deck.length+'/'+deck.length;$('bar').style.width='100%';}else showRound();}
$('startBtn').onclick=start;$('next').onclick=next;$('restart').onclick=()=>location.reload();validate();
</script>
</body>
</html>
